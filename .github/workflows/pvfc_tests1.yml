name: Test set 1

on: [ push ]

jobs:
  flake8-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: py-actions/flake8@v2
        with:
          ignore: "E265,E303,E501,W503,F824"
          max-line-length: "120"

  test-radiation-forecast:
    runs-on: ubuntu-latest
    name: Testing FMI radiation forecasting functiontee
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install . pytest
      - run: pytest tests/radiation_forecasting_tests.py -s